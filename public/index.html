<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limitless Sales System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#f0f4ff',100:'#dbe5ff',200:'#b8ccff',300:'#8aa9ff',400:'#5b7eff',500:'#3b5bff',600:'#2a3fe8',700:'#2230c2',800:'#1f2a9c',900:'#1d2780' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

  <!-- LOGIN VIEW -->
  <div id="loginView" class="hidden min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500">
    <div class="w-full max-w-md">
      <div class="text-center mb-8 text-white">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 backdrop-blur rounded-2xl mb-4">
          <svg class="w-12 h-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <h1 class="text-4xl font-bold mb-2">Limitless</h1>
        <p class="text-white/80">Sales Management System</p>
      </div>
      <div class="bg-white rounded-2xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-slate-800 mb-1">Welcome back</h2>
        <p class="text-slate-500 mb-6">Sign in to continue</p>
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
            <input type="text" id="loginUsername" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" placeholder="Enter your username">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" id="loginPassword" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" placeholder="Enter your password">
          </div>
          <div id="loginError" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg"></div>
          <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 rounded-lg transition">
            Sign in
          </button>
        </form>
        <div class="mt-6 pt-6 border-t border-slate-100">
          <p class="text-xs text-slate-500 mb-2 font-medium">ادخل اسم المستخدم وكلمة المرور الخاصة بك.</p>
          <p class="text-xs text-slate-400">إذا لم يكن لديك حساب، تواصل مع مسؤول النظام للحصول على بيانات الدخول.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- APP VIEW -->
  <div id="appView" class="hidden">
    <!-- TOP BAR -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
      <div class="flex items-center justify-between px-6 py-3">
        <div class="flex items-center gap-3">
          <button id="sidebarToggle" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="text-lg font-bold text-slate-800">Limitless</span>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <div id="userName" class="text-sm font-semibold text-slate-800"></div>
            <div id="userRole" class="text-xs text-slate-500"></div>
          </div>
          <div id="userAvatar" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold"></div>
          <button id="themeToggle" onclick="toggleTheme()" class="p-2 hover:bg-slate-100 rounded-lg" title="Toggle dark mode">Dark mode</button>
          <button id="logoutBtn" class="p-2 hover:bg-slate-100 rounded-lg" title="Logout">
            <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>
      </div>
    </header>

    <div class="flex">
      <!-- SIDEBAR -->
      <aside id="sidebar" class="bg-white border-r border-slate-200 w-64 min-h-screen p-4 space-y-1 fixed lg:sticky top-[57px] left-0 z-20 h-[calc(100vh-57px)] overflow-y-auto transform -translate-x-full lg:translate-x-0 transition-transform">
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-3 py-2">Main</div>
        <a href="#" data-page="dashboard" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span class="font-medium">Dashboard</span>
        </a>
        <a href="#" data-page="clients" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          <span class="font-medium">Clients</span>
        </a>
        <a href="#" data-page="calls" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          <span class="font-medium">Calls</span>
        </a>
        <a href="#" data-page="meetings" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <span class="font-medium">Meetings</span>
        </a>
        <a href="#" data-page="todos" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          <span class="font-medium">To-do List</span>
        </a>

        <div id="adminNav" class="hidden">
          <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-3 py-2 mt-4">Admin</div>
          <a href="#" data-page="team" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-100 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <span class="font-medium">Team</span>
          </a>
          <a href="#" data-page="analytics" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-100 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="font-medium">Analytics</span>
          </a>
          <a href="#" data-page="activity" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-100 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="font-medium">Activity Log</span>
          </a>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 p-6 lg:p-8 min-h-[calc(100vh-57px)]">
        <div id="pageContent"></div>
      </main>
    </div>
  </div>

  <!-- MODAL CONTAINER -->
  <div id="modalContainer"></div>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-4 right-4 bg-slate-800 text-white px-5 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2"></div>

  <script src="/app.js"></script>
</body>
</html>
